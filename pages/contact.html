    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="../img/mi-foto-128.jpg" alt="mi-foto-logo">
        <h1>Laura Ramos, tu asesora de marketing</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">Laura Ramos</a>
            </div>
        </nav>
    </header>
    <main>
       <div class="container text-center mt-5">

        <div class="titulo-contacto">
            <h1>¿Demasiado bueno para ser verdad?</h1>
             <p>Contáctame hoy si tienes preguntas o para programar una consulta gratuita</p>
        </div>

        <div class="form-card">
            <form>

                <div class="mb-3">
                <label>Nombre</label>
                <input type="text" placeholder="Tu nombre">
                </div>

                <div class="mb-3">
                <label>Ciudad</label>
                <input type="text" placeholder="Tu ciudad">
                </div>    

                <div class="mb-3">
                <label>Email</label>
                <input type="email" placeholder="tu@email.com">
                </div>

                <div class="mb-3">
                <label>Consulta</label>
                <textarea placeholder="Escribe tu mensaje"></textarea>
                </div>

                <div class="mb-3">
                <label for="kit" class="form-label">Lo quiero ya!</label>
                    <select name="kit" id="kit" class="form-select">
                        <option value="boarding">KIT BOARDING PASS</option>
                        <option value="first">KIT FIRST CLASS</option>
                    </select>
                </div>
                <div class="text-center"></div>
                <button type="submit">Enviar mensaje</button>

            </form>
        </div>
    
    </main>
    
    <footer>
        <div class="footer-col">
            <p>© 2026 Laura Ramos. Todos los derechos reservados.</p>
            </div>

            <div class="footer-col redes">
             <p>Mis redes</p>

            <div class="red-face">
                <img class="logo" src="../img/face-logo.png" alt="logo-facebook">
                <span>LauRa_mkt</span>
            </div>

            <div class="red-insta">
                <img class="logo" src="../img/icons-instagram-64.png" alt="logo-insta">
                <span>soylaura-mkt</span>
            </div>
            </div>

            <div class="footer-col">
            <h4>Sede</h4>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3268.889176097797!2d-67.68641412424311!3d-34.98444057282022!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9678174736912e2b%3A0x6cc3b433f2209af9!2sSalvador%20Calafat%20557%2C%20M5620%20Gral.%20Alvear%2C%20Mendoza!5e0!3m2!1ses!2sar!4v1769228580807!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
